name: ci

# Note: "on" must be quoted — YAML 1.1 treats bare `on` as boolean True, which
# silently drops the trigger and makes GitHub Actions cancel every job.

"on":
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run pytest
        run: pytest -v

  build-exe:
    name: Build Windows .exe (PyInstaller)
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build .exe
        run: pyinstaller ports.spec --clean --noconfirm

      - name: Smoke-test the .exe
        shell: cmd
        run: |
          .\dist\port-manager.exe --help
          .\dist\port-manager.exe list

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: port-manager-windows-exe
          path: dist/port-manager.exe
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test, build-exe]
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.head_ref || '', 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/farkus-port-manager

    permissions:
      id-token: write   # for PyPI trusted publishing (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Attach .exe to GitHub Release
    runs-on: windows-latest
    needs: [test, build-exe]
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.head_ref || '', 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build .exe
        run: pyinstaller ports.spec --clean --noconfirm

      - name: Create GitHub release + attach .exe
        uses: softprops/action-gh-release@v2
        with:
          files: dist/port-manager.exe
          generate_release_notes: true